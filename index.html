<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Gửi Vợ iu Ngọc Huyền ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:'Segoe UI',sans-serif;
}

.container{
    text-align:center;
    z-index:10;
}

h1{
    color:white;
    font-size:42px;
    margin-bottom:20px;
    text-shadow:0 0 15px rgba(255,255,255,.8);
}

p{
    color:white;
    font-size:22px;
    margin-bottom:30px;
}

.btn-group{
    display:flex;
    gap:20px;
    justify-content:center;
}

button{
    border:none;
    cursor:pointer;
    padding:15px 35px;
    border-radius:50px;
    font-size:20px;
    transition:.3s;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

#yes{
    background:#ff3366;
    color:white;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    background:white;
    color:#ff3366;
}

.heart{
    position:fixed;
    color:red;
    font-size:30px;
    animation:float 4s linear forwards;
    pointer-events:none;
}

@keyframes float{
    0%{
        transform:translateY(0) scale(0);
        opacity:1;
    }
    100%{
        transform:translateY(-800px) scale(2);
        opacity:0;
    }
}

.success{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(255,192,203,.95);
    z-index:999;
}

.success h2{
    font-size:50px;
    color:#ff0066;
    margin-bottom:20px;
}

.success p{
    color:#d60052;
    font-size:24px;
}
</style>
</head>

<body>

<div class="container">
    <h1>❤️ Em đồng ý cho anh so vu nhaaa ❤️</h1>
    <p>Anh đã suy nghĩ rất lâu mới dám hỏi điều này 🥺</p>

    <div class="btn-group">
        <button id="yes">Đồng Ý ❤️</button>
        <button id="no">Không 😢</button>
    </div>
</div>

<div class="success" id="success">
    <h2>Oh yeahhh ❤️❤️❤️</h2>
    <p>Anh iu emm 🥰</p>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const success = document.getElementById("success");

function moveButton(){
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", () => {

    success.style.display = "flex";

    setInterval(() => {
        const heart = document.createElement("div");

        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.bottom = "-50px";
        heart.style.fontSize =
            Math.random() * 40 + 20 + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 4000);

    }, 100);
});
</script>

</body>
</html>
